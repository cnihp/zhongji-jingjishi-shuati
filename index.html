<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中级经济?· 刷题工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}
.app-header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: #fff;
  padding: 20px 0;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.app-header h1 { font-size: 24px; font-weight: 700; letter-spacing: 2px; }
.app-header p { font-size: 13px; color: #a0aec0; margin-top: 6px; }
.container { max-width: 820px; margin: 0 auto; padding: 16px; }

/* 导航标签 */
.tabs {
  display: flex; gap: 4px; background: #fff; border-radius: 12px;
  padding: 4px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  overflow-x: auto; position: sticky; top: 8px; z-index: 10;
}
.tab-btn {
  flex: 1; min-width: 80px; padding: 10px 8px; border: none;
  background: transparent; border-radius: 8px; font-size: 13px;
  font-weight: 600; color: #666; cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { background: #f0f2f5; color: #1a1a2e; }
.tab-btn.active { background: #1a1a2e; color: #fff; }
.tab-btn .badge {
  display: inline-block; background: #e74c3c; color: #fff;
  font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 4px;
}


/* 章节按钮 */
#chapterBar {
  margin-bottom: 16px;
}
.chapter-btns {
  display: flex; flex-wrap: wrap; gap: 6px;
  background: #fff; border-radius: 12px; padding: 10px 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.chapter-btn {
  padding: 6px 14px; border: 2px solid #e2e8f0; border-radius: 20px;
  background: transparent; font-size: 13px; font-weight: 600;
  color: #666; cursor: pointer; transition: all 0.2s;
}

.section-btns {
  display: flex; flex-wrap: wrap; gap: 6px;
  background: #fff; border-radius: 12px; padding: 8px 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.section-btn {
  padding: 5px 12px; border: 2px solid #e2e8f0; border-radius: 16px;
  background: transparent; font-size: 12px; font-weight: 500;
  color: #666; cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.section-btn:hover { border-color: #93c5fd; background: #eff6ff; }
.section-btn.active { border-color: #2563eb; background: #2563eb; color: #fff; }
.chapter-btn:hover { border-color: #a0aec0; background: #f8fafc; }
.chapter-btn.active { border-color: #1a1a2e; background: #1a1a2e; color: #fff; }

/* 统计卡片 */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: #fff; border-radius: 12px; padding: 14px 12px;
  text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.stat-card .num { font-size: 22px; font-weight: 700; color: #1a1a2e; }
.stat-card .label { font-size: 11px; color: #888; margin-top: 4px; }

/* 模式切换 */
.mode-switch {
  display: flex; gap: 4px; background: #fff; border-radius: 12px;
  padding: 4px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.mode-switch .mode-btn {
  flex: 1; padding: 8px 12px; border: none; background: transparent;
  border-radius: 8px; font-size: 13px; font-weight: 600; color: #666;
  cursor: pointer; transition: all 0.2s;
}
.mode-switch .mode-btn:hover { background: #f0f2f5; }
.mode-switch .mode-btn.active { background: #16213e; color: #fff; }

/* 题目区域 */
#questionArea {
  background: #fff; border-radius: 12px; padding: 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px;
}
.q-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.q-number {
  background: #1a1a2e; color: #fff; padding: 4px 12px;
  border-radius: 20px; font-size: 13px; font-weight: 600;
}
.q-type {
  background: #e2e8f0; color: #4a5568; padding: 4px 12px;
  border-radius: 20px; font-size: 12px; font-weight: 600;
}
.q-type.multi { background: #fef3c7; color: #92400e; }
.q-type.case { background: #dbeafe; color: #1e40af; }
.chapter-tag {
  display: inline-block; background: #e8e8ff; color: #444;
  padding: 4px 12px; border-radius: 20px; font-size: 12px;
  font-weight: 600; margin-left: 4px;
}
.q-text {
  font-size: 16px; line-height: 1.8; margin-bottom: 20px; font-weight: 500;
}

/* 选项 */
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px;
  cursor: pointer; transition: all 0.2s; font-size: 15px; line-height: 1.6;
}
.option:hover { border-color: #a0aec0; background: #f8fafc; }
.option.selected { border-color: #1a1a2e; background: #f0f2f5; }
.option.correct { border-color: #22c55e; background: #f0fdf4; }
.option.wrong { border-color: #ef4444; background: #fef2f2; }
.option.disabled { cursor: default; opacity: 0.85; }
.option .letter {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
  background: #e2e8f0; display: flex; align-items: center;
  justify-content: center; font-weight: 700; font-size: 13px;
}
.option.selected .letter { background: #1a1a2e; color: #fff; }
.option.correct .letter { background: #22c55e; color: #fff; }
.option.wrong .letter { background: #ef4444; color: #fff; }

/* 底部操作?*/
.action-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 20px; padding-top: 16px; border-top: 1px solid #e2e8f0;
}
.btn {
  padding: 10px 20px; border: none; border-radius: 10px; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: #1a1a2e; color: #fff; }
.btn-primary:hover { background: #16213e; }
.btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
.btn-outline { background: #fff; color: #1a1a2e; border: 2px solid #1a1a2e; }
.btn-outline:hover { background: #f0f2f5; }
.btn-success { background: #22c55e; color: #fff; }
.btn-success:hover { background: #16a34a; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-sm { padding: 6px 14px; font-size: 12px; }

/* 解析 */
.explanation {
  margin-top: 16px; padding: 16px; background: #f8fafc;
  border-radius: 12px; border-left: 4px solid #1a1a2e;
  display: none; font-size: 14px; line-height: 1.8;
}
.explanation.show { display: block; }
.explanation .label { font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }

/* 进度?*/
.progress-bar {
  height: 4px; background: #e2e8f0; border-radius: 4px;
  margin-bottom: 16px; overflow: hidden;
}
.progress-bar .fill {
  height: 100%; background: linear-gradient(90deg, #1a1a2e, #4a5568);
  border-radius: 4px; transition: width 0.3s;
}

/* 结果统计 */
.result-box {
  text-align: center; padding: 30px 20px;
}
.result-box .big-score {
  font-size: 48px; font-weight: 800; color: #1a1a2e;
}
.result-box .pass { color: #22c55e; font-size: 20px; font-weight: 700; }
.result-box .fail { color: #ef4444; font-size: 20px; font-weight: 700; }

/* 错题?*/
.wrong-list { margin-top: 12px; }
.wrong-item {
  padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;
  margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
  font-size: 14px;
}
.wrong-item:hover { background: #f8fafc; border-color: #1a1a2e; }
.wrong-item .wi-label { color: #ef4444; font-weight: 600; margin-bottom: 4px; }
.wrong-item .wi-type { color: #888; font-size: 12px; }

@media (max-width: 600px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .app-header h1 { font-size: 20px; }
  .container { padding: 10px; }
  #questionArea { padding: 16px; }
  .q-text { font-size: 15px; }
}
</style>
</head>
<body>

<div class="app-header">
  <h1>中级经济?· 刷题工具</h1>
  <p>《经济基础知识?《农业经济专业知识与实务?· 全真模拟刷题</p>
</div>

<div class="container">

  <!-- 导航标签 -->
  <div class="tabs" id="tabBar">
    <button class="tab-btn active" data-tab="practice">练习模式</button>
    <button class="tab-btn" data-tab="exam">模拟考试</button>
    <button class="tab-btn" data-tab="chapter">章节练习</button>
    <button class="tab-btn" data-tab="wrong">错题?<span class="badge" id="wrongBadge">0</span></button>
  </div>

  <!-- 统计 -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="num" id="totalQ">0</div><div class="label">总题?/div></div>
    <div class="stat-card"><div class="num" id="doneQ">0</div><div class="label">已答?/div></div>
    <div class="stat-card"><div class="num" id="correctQ">0</div><div class="label">正确</div></div>
    <div class="stat-card"><div class="num" id="rateQ">0%</div><div class="label">正确?/div></div>
  </div>

  <!-- 模式切换 -->
  <div class="mode-switch" id="modeSwitch">
    <button class="mode-btn active" data-mode="all">全部题目</button>
    <button class="mode-btn" data-mode="single">单选题</button>
    <button class="mode-btn" data-mode="multi">多选题</button>
  </div>

  <!-- 进度?-->
  <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>

  <!-- 题目?-->
  
  <!-- 章节选择 -->
  <div id="chapterBar" style="display:none;">
    <div class="chapter-btns" id="chapterBtns">
      <button class="chapter-btn active" data-chapter="all">全部章节</button>
    </div>
  <div id="sectionBar" style="display:none;margin-bottom:12px;">
    <div class="section-btns" id="sectionBtns"></div>
  </div>
  </div>

  <div id="questionArea">
    <div id="qContent"></div>
  </div>

  <!-- 底部操作?-->
  <div class="action-bar" id="actionBar">
    <button class="btn btn-outline btn-sm" id="prevBtn" disabled>&#x2190; 上一?/button>
    <button class="btn btn-primary" id="submitBtn">提交答案</button>
    <button class="btn btn-outline" id="showAnsBtn">看答?/button>
    <button class="btn btn-success btn-sm" id="nextBtn">下一?&#x2192;</button>
    <button class="btn btn-danger btn-sm" id="resetBtn" style="margin-left:auto;">重新开?/button>
  </div>

</div>

<!-- 题库数据从外部文件加?-->
<script src="questions.js"></script>

<script>

// ================ 状?================
let allQuestions = [...questionBank];
let currentFilter = 'all';
let currentTab = 'practice';
let currentChapter = 'all';
let currentSection = 'all';
let currentIndex = 0;
let answeredState = {};  // { id: { selected: [...], submitted: bool, isCorrect: bool } }
let wrongSet = new Set(); // 错题id集合

// ================ 工具 ================
const letters = ['A', 'B', 'C', 'D', 'E'];

function getFilteredQuestions() {
  let qs = [...allQuestions];
  if (currentTab === 'wrong') {
    qs = qs.filter(q => wrongSet.has(q.id));
    if (qs.length === 0) return [];
  }
  if (currentTab === 'chapter' && currentChapter !== 'all') {
    qs = qs.filter(q => q.chapter === currentChapter);
  }
  if (currentTab === 'chapter' && currentSection !== 'all') {
    qs = qs.filter(q => q.section === currentSection);
  }
  if (currentFilter === 'single') qs = qs.filter(q => q.type === 'single');
  else if (currentFilter === 'multi') qs = qs.filter(q => q.type === 'multi' || q.type === 'case');
  return qs;
}

function getTypeLabel(q) {
  if (q.type === 'single') return '单选题';
  if (q.type === 'multi') return '多选题';
  return '案例分析题';
}

function saveState() {
  localStorage.setItem('jjjs_answered', JSON.stringify(answeredState));
  localStorage.setItem('jjjs_wrong', JSON.stringify([...wrongSet]));
}

function loadState() {
  try {
    const a = localStorage.getItem('jjjs_answered');
    if (a) answeredState = JSON.parse(a);
    const w = localStorage.getItem('jjjs_wrong');
    if (w) wrongSet = new Set(JSON.parse(w));
  } catch(e) {}
}

// ================ 渲染 ================
function render() {
  const qs = getFilteredQuestions();
  if (qs.length === 0) {
    if (currentTab === 'wrong') {
      document.getElementById('qContent').innerHTML = '<div class="result-box"><div style="font-size:40px;margin-bottom:12px;">&#x2705;</div><div style="font-size:18px;font-weight:600;color:#666;">错题集已清空，继续保持！</div></div>';
    } else {
      document.getElementById('qContent').innerHTML = '<div class="result-box"><div style="font-size:18px;color:#888;">当前筛选条件下没有题目</div></div>';
    }
    updateStats();
    updateProgress();
    return;
  }
  if (currentIndex >= qs.length) currentIndex = qs.length - 1;
  if (currentIndex < 0) currentIndex = 0;
  const q = qs[currentIndex];
  const state = answeredState[q.id] || { selected: [], submitted: false, isCorrect: false };
  const isMulti = (q.type === 'multi' || q.type === 'case');
  const submitted = state.submitted;

  let html = '<div class="q-header">';
  html += `<span class="q-number">#${currentIndex+1}/${qs.length}</span>`;
  html += `<span class="q-type ${isMulti ? 'multi' : ''} ${q.type === 'case' ? 'case' : ''}">${getTypeLabel(q)} · ${q.category}</span>`;
  if (q.chapter) html += `<span class="chapter-tag">${q.chapter}</span>`;
  html += '</div>';
  html += `<div class="q-text">${q.text}</div>`;
  if (q.type === 'case') {
    html += `<div style="font-size:13px;color:#1e40af;background:#dbeafe;padding:8px 12px;border-radius:8px;margin-bottom:12px;">&#x2139;&#xFE0F; 案例分析题为不定项选择题，错选不得分，少选每个正确选项得0.5分
</div>`;
  } else if (q.type === 'multi') {
    html += `<div style="font-size:13px;color:#92400e;background:#fef3c7;padding:8px 12px;border-radius:8px;margin-bottom:12px;">&#x2139;&#xFE0F; 多选题须选出两个及以上正确选项，错选不得分，少选每个正确选项得0.5分
</div>`;
  }

  html += '<div class="options">';
  const correctAnswer = Array.isArray(q.answer) ? q.answer : [q.answer];
  q.options.forEach((opt, idx) => {
    let cls = 'option';
    if (submitted) {
      cls += ' disabled';
      if (correctAnswer.includes(idx)) cls += ' correct';
      else if (state.selected.includes(idx)) cls += ' wrong';
    } else {
      if (state.selected.includes(idx)) cls += ' selected';
    }
    html += `<div class="${cls}" data-idx="${idx}" onclick="selectOption(this, ${q.id}, ${isMulti})">`;
    html += `<span class="letter">${letters[idx]}</span>`;
    html += `<span>${opt}</span>`;
    html += '</div>';
  });
  html += '</div>';

  // 解析
  if (submitted) {
    const correctStr = correctAnswer.map(i => letters[i]).join(', ');
    const isCorrect = state.isCorrect;
    html += `<div class="explanation show">`;
    html += `<div class="label">${isCorrect ? '&#x2705; 回答正确' : '&#x274C; 回答错误'} · 正确答案?{correctStr}</div>`;
    html += `<div>${q.explanation}</div>`;
    html += '</div>';
  } else {
    html += '<div class="explanation" id="explBox"></div>';
  }

  document.getElementById('qContent').innerHTML = html;

  // 按钮状?  document.getElementById('prevBtn').disabled = (currentIndex === 0);
  document.getElementById('nextBtn').disabled = (currentIndex >= qs.length - 1);
  const subBtn = document.getElementById('submitBtn');
  const showBtn = document.getElementById('showAnsBtn');
  subBtn.disabled = submitted;
  if (submitted) {
    subBtn.textContent = '已提交';
  } else {
    subBtn.textContent = isMulti ? '提交答案' : '提交答案';
  }

  updateStats();
  updateProgress();
}

function selectOption(el, qid, isMulti) {
  const state = answeredState[qid] || { selected: [], submitted: false, isCorrect: false };
  if (state.submitted) return;
  const idx = parseInt(el.dataset.idx);
  if (isMulti) {
    const pos = state.selected.indexOf(idx);
    if (pos > -1) state.selected.splice(pos, 1);
    else state.selected.push(idx);
  } else {
    state.selected = [idx];
  }
  answeredState[qid] = state;
  saveState();
  render();
}

// 提交答案
document.getElementById('submitBtn').addEventListener('click', function() {
  const qs = getFilteredQuestions();
  if (qs.length === 0) return;
  const q = qs[currentIndex];
  const state = answeredState[q.id] || { selected: [], submitted: false, isCorrect: false };
  if (state.submitted) return;
  if (state.selected.length === 0) { alert('请先选择一个选项'); return; }

  const correctAnswer = Array.isArray(q.answer) ? q.answer : [q.answer];
  const sortedSelected = [...state.selected].sort();
  const sortedCorrect = [...correctAnswer].sort();
  let isCorrect = false;
  if (q.type === 'single') {
    isCorrect = sortedSelected.length === 1 && sortedCorrect.length === 1 && sortedSelected[0] === sortedCorrect[0];
  } else {
    // 多?案例：完全正确才算正确（模拟考试严格模式?    isCorrect = sortedSelected.length === sortedCorrect.length && sortedSelected.every((v,i) => v === sortedCorrect[i]);
  }
  state.submitted = true;
  state.isCorrect = isCorrect;
  answeredState[q.id] = state;

  if (!isCorrect) {
    wrongSet.add(q.id);
  } else {
    wrongSet.delete(q.id);
  }
  saveState();
  render();
});

// 看答案
document.getElementById('showAnsBtn').addEventListener('click', function() {
  const qs = getFilteredQuestions();
  if (qs.length === 0) return;
  const q = qs[currentIndex];
  const correctAnswer = Array.isArray(q.answer) ? q.answer : [q.answer];
  const correctStr = correctAnswer.map(i => letters[i]).join(', ');
  const explBox = document.querySelector('.explanation');
  if (explBox) {
    explBox.classList.add('show');
    explBox.innerHTML = `<div class="label">&#x1F4DD; 参考答案：${correctStr}</div><div>${q.explanation}</div>`;
  }
});

// 导航
document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
document.getElementById('nextBtn').addEventListener('click', () => {
  const qs = getFilteredQuestions();
  if (currentIndex < qs.length - 1) { currentIndex++; render(); }
});

// 重置
document.getElementById('resetBtn').addEventListener('click', function() {
  if (!confirm('确定要重新开始吗？所有答题记录将被清除')) return;
  answeredState = {};
  wrongSet = new Set();
  currentIndex = 0;
  saveState();
  render();
});

// 统计
function updateStats() {
  const total = allQuestions.length;
  let done = 0, correct = 0;
  Object.values(answeredState).forEach(s => {
    if (s.submitted) {
      done++;
      if (s.isCorrect) correct++;
    }
  });
  document.getElementById('totalQ').textContent = total;
  document.getElementById('doneQ').textContent = done;
  document.getElementById('correctQ').textContent = correct;
  document.getElementById('rateQ').textContent = done ? Math.round(correct/done*100) + '%' : '0%';
  document.getElementById('wrongBadge').textContent = wrongSet.size;
}

function updateProgress() {
  const qs = getFilteredQuestions();
  const done = qs.filter(q => {
    const s = answeredState[q.id];
    return s && s.submitted;
  }).length;
  const pct = qs.length ? Math.round(done/qs.length*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// 生成章节按钮
function buildChapterButtons() {
  const chSet = new Set();
  allQuestions.forEach(q => {
    if (q.chapter) chSet.add(q.chapter);
  });
  const container = document.getElementById('chapterBtns');
  if (!container) return;
  
  // Group by major part
  const parts = [
    { name: '第一部分 经济学基础', regex: /^(第一|第二|第三|第四|第五|第六|第七|第八|第九|第十)章/ },
    { name: '第二部分 财政', regex: /^(第十一|第十二|第十三|第十四|第十五|第十六)章/ },
    { name: '第三部分 货币与金融', regex: /^(第十七|第十八|第十九|第二十|第二十一)章/ },
    { name: '第四部分 统计', regex: /^(第二十二|第二十三|第二十四|第二十五)章/ },
    { name: '第五部分 会计', regex: /^(第二十六|第二十七|第二十八|第二十九)章/ },
    { name: '第六部分 法律', regex: /^(第三十|第三十一|第三十二|第三十三)章/ },
    { name: '农业经济', regex: /^第.*章.*农业|^农业/ },
  ];
  
  let html = '<button class="chapter-btn active" data-chapter="all">全部章节</button>';
  
  const sortedChs = Array.from(chSet).sort();
  let currentPart = '';
  
  sortedChs.forEach(ch => {
    // Find which part this chapter belongs to
    let partName = '';
    if (ch.includes('农业')) {
      partName = '农业经济';
    } else {
      for (const p of parts) {
        if (p.regex.test(ch)) {
          partName = p.name;
          break;
        }
      }
    }
    
    if (partName && partName !== currentPart) {
      currentPart = partName;
      html += `<div style="width:100%;font-size:12px;color:#888;margin:6px 0 2px 4px;font-weight:600;">${partName}</div>`;
    }
    
    html += `<button class="chapter-btn" data-chapter="${ch.replace(/'/g, "\'")}">${ch}</button>`;
  });
  
  container.innerHTML = html;
  
  // Add click handlers
  
function buildSectionButtons(chapterName) {
  var secSet = new Set();
  allQuestions.forEach(function(q) {
    if (q.chapter === chapterName && q.section) secSet.add(q.section);
  });
  var container = document.getElementById('sectionBtns');
  if (!container) return;
  var bar = document.getElementById('sectionBar');
  if (secSet.size === 0) { bar.style.display = 'none'; return; }
  var html = '<button class="section-btn active" data-section="all">全部?/button>';
  Array.from(secSet).sort().forEach(function(sec) {
    html += '<button class="section-btn" data-section="' + sec.replace(/'/g, "\\'") + '">' + sec + '</button>';
  });
  container.innerHTML = html;
  bar.style.display = 'block';
  container.querySelectorAll('.section-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      container.querySelectorAll('.section-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentSection = this.dataset.section;
      currentIndex = 0;
      render();
    });
  });
}

  container.querySelectorAll('.chapter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      container.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentChapter = this.dataset.chapter;
      currentSection = 'all';
      currentIndex = 0;
      buildSectionButtons(currentChapter);
      render();
    });
  });
}

// 标签切换
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentTab = this.dataset.tab;
    currentIndex = 0;
    // Show/hide chapter bar
    const chapterBar = document.getElementById('chapterBar');
    if (chapterBar) {
      chapterBar.style.display = (currentTab === 'chapter') ? 'block' : 'none';
      var secBar = document.getElementById('sectionBar');
      if (secBar) secBar.style.display = 'none';
      currentSection = 'all';
      if (currentTab === 'chapter') buildChapterButtons();
    }
    render();
  });
});

// 模式切换
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    if (currentTab === 'wrong') return;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.mode;
    currentIndex = 0;
    render();
  });
});

// ================ 启动 ================
loadState();
buildChapterButtons();
render();
</script>
</body>
</html>
