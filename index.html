<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>中级经济师 · 刷题工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh;line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 50%,rgba(30,41,59,0.6) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(217,119,6,0.08) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(30,41,59,0.4) 0%,transparent 50%);pointer-events:none;z-index:0}
::selection{background:rgba(217,119,6,0.3);color:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.anim-fade{animation:fadeUp 0.5s ease both}
.app-wrap{max-width:840px;margin:0 auto;padding:32px 24px 64px;position:relative;z-index:1}
.app-header{text-align:center;padding:40px 0 32px}
.app-header .logo{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#d97706,#f59e0b);font-size:28px;margin-bottom:16px;box-shadow:0 8px 32px rgba(217,119,6,0.25)}
.app-header h1{font-size:28px;font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,#fbbf24,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-header p{font-size:13px;color:#64748b;margin-top:4px;letter-spacing:0.5px}
.app-header .glow-line{width:60px;height:3px;margin:12px auto 0;background:linear-gradient(90deg,transparent,#d97706,transparent);border-radius:2px}
.user-section{display:flex;justify-content:center;margin-top:16px}
.user-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px 6px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:100px;font-size:13px;font-weight:600;color:#cbd5e1;cursor:pointer;transition:all 0.25s;position:relative;font-family:inherit}
.user-badge:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.15)}
.user-badge .dot{width:7px;height:7px;background:#22c55e;border-radius:50%;box-shadow:0 0 8px rgba(34,197,94,0.5)}
.user-dropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;background:#1e293b;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:4px;min-width:130px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.user-dropdown.show{display:block;animation:slideDown 0.2s ease}
.user-dropdown button{display:block;width:100%;padding:8px 14px;border:none;background:transparent;border-radius:8px;font-size:13px;font-family:inherit;color:#94a3b8;cursor:pointer;text-align:left;transition:all 0.15s}
.user-dropdown button:hover{background:rgba(255,255,255,0.06);color:#e2e8f0}
.user-dropdown .logout-btn{color:#f87171}
.user-dropdown .logout-btn:hover{background:rgba(239,68,68,0.1)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:16px 8px;text-align:center;transition:all 0.3s;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);opacity:0;transition:opacity 0.3s}
.stat-card:hover::before{opacity:1}
.stat-card:hover{background:rgba(255,255,255,0.06);transform:translateY(-2px)}
.stat-card .num{font-size:24px;font-weight:800;color:#f1f5f9;line-height:1.2}
.stat-card .label{font-size:11px;color:#64748b;margin-top:4px}
.stat-card.gold .num{background:linear-gradient(135deg,#fbbf24,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card.green .num{color:#22c55e}
.tab-bar{display:flex;gap:4px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:4px;margin-bottom:20px}
.tab-btn{flex:1;padding:12px 6px;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;color:#64748b;background:transparent;cursor:pointer;transition:all 0.3s;white-space:nowrap;position:relative}
.tab-btn:hover{color:#94a3b8;background:rgba(255,255,255,0.04)}
.tab-btn.active{color:#fff;background:rgba(217,119,6,0.15);box-shadow:inset 0 1px 0 rgba(255,255,255,0.05)}
.tab-btn .badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 5px;border-radius:10px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;margin-left:4px;vertical-align:middle}
.mode-pills{display:flex;gap:8px;margin-bottom:20px}
.pill-btn{padding:7px 18px;border:1px solid rgba(255,255,255,0.1);border-radius:100px;background:transparent;font-size:12px;font-weight:600;font-family:inherit;color:#64748b;cursor:pointer;transition:all 0.25s}
.pill-btn:hover{border-color:rgba(255,255,255,0.2);color:#94a3b8}
.pill-btn.active{border-color:#d97706;background:rgba(217,119,6,0.12);color:#fbbf24;box-shadow:0 0 20px rgba(217,119,6,0.08)}
#chapterSection{display:none;margin-bottom:20px}
.chapter-panel,.section-panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px 16px}
.chapter-panel{margin-bottom:8px}
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 14px;border:1px solid rgba(255,255,255,0.1);border-radius:100px;background:transparent;font-size:12px;font-weight:500;font-family:inherit;color:#64748b;cursor:pointer;transition:all 0.2s}
.chip:hover{border-color:rgba(255,255,255,0.2);color:#94a3b8;background:rgba(255,255,255,0.03)}
.chip.active{border-color:#d97706;background:rgba(217,119,6,0.12);color:#fbbf24}
.chip.active-all{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#e2e8f0}
.chip.part-label{width:100%;border:none;background:transparent;font-size:11px;font-weight:700;color:#475569;padding:8px 2px 2px;cursor:default;pointer-events:none}
.progress-wrap{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#d97706,#f59e0b,#fbbf24);border-radius:2px;transition:width 0.5s ease}
.q-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(217,119,6,0.3),transparent)}
.q-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:16px}
.q-number{display:inline-flex;align-items:center;padding:3px 12px;border-radius:8px;background:rgba(255,255,255,0.06);font-size:12px;font-weight:700;color:#94a3b8}
.q-tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600}
.q-tag.single{background:rgba(59,130,246,0.15);color:#93c5fd}
.q-tag.multi{background:rgba(217,119,6,0.15);color:#fcd34d}
.q-chapter{display:inline-flex;align-items:center;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(139,92,246,0.12);color:#c4b5fd}
.q-text{font-size:16px;font-weight:500;line-height:1.9;margin-bottom:24px;color:#f1f5f9}
.q-text p{margin-bottom:6px}
.options{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;cursor:pointer;transition:all 0.25s;font-size:15px;line-height:1.6;user-select:none;background:rgba(255,255,255,0.02)}
.opt:hover{border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.04)}
.opt.selected{border-color:rgba(217,119,6,0.4);background:rgba(217,119,6,0.06)}
.opt.correct{border-color:rgba(34,197,94,0.4);background:rgba(34,197,94,0.06);pointer-events:none}
.opt.wrong{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.06);pointer-events:none}
.opt.reveal-correct{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.03);pointer-events:none}
.opt .letter{flex-shrink:0;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;font-weight:700;background:rgba(255,255,255,0.06);color:#64748b;transition:all 0.25s}
.opt.selected .letter{background:rgba(217,119,6,0.2);color:#fbbf24}
.opt.correct .letter{background:rgba(34,197,94,0.2);color:#22c55e}
.opt.wrong .letter{background:rgba(239,68,68,0.2);color:#f87171}
.opt.reveal-correct .letter{background:rgba(34,197,94,0.15);color:#4ade80}
.opt .opt-text{flex:1;min-width:0;color:#e2e8f0}
.opt .opt-text p{margin:0}
.explanation{margin-top:18px;padding:18px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);display:none}
.explanation.show{display:block;animation:fadeUp 0.3s ease}
.explanation .label{font-weight:700;color:#e2e8f0;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.explanation div:last-child{color:#94a3b8;font-size:14px;line-height:1.7}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 22px;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.25s}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;box-shadow:0 4px 16px rgba(217,119,6,0.2)}
.btn-primary:hover:not(:disabled){box-shadow:0 6px 24px rgba(217,119,6,0.3)}
.btn-success{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;box-shadow:0 4px 16px rgba(34,197,94,0.2)}
.btn-success:hover:not(:disabled){box-shadow:0 6px 24px rgba(34,197,94,0.3)}
.btn-outline{background:rgba(255,255,255,0.04);color:#94a3b8;border:1px solid rgba(255,255,255,0.1)}
.btn-outline:hover:not(:disabled){border-color:rgba(255,255,255,0.2);color:#e2e8f0;background:rgba(255,255,255,0.06)}
.btn-ghost{background:transparent;color:#64748b;padding:10px 14px}
.btn-ghost:hover:not(:disabled){color:#f87171;background:rgba(239,68,68,0.08)}
.btn-sm{padding:8px 16px;font-size:12px}

.user-badge-simple{display:inline-flex;align-items:center;gap:8px;padding:6px 14px 6px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:100px;font-size:13px;font-weight:600;color:#cbd5e1;font-family:inherit}
.user-badge-simple .dot{width:7px;height:7px;background:#22c55e;border-radius:50%;box-shadow:0 0 8px rgba(34,197,94,0.5)}


.rank-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;margin-left:8px;border:1px solid rgba(255,255,255,0.1);border-radius:100px;background:transparent;font-size:12px;font-weight:600;font-family:inherit;color:#64748b;cursor:pointer;transition:all 0.25s}
.rank-btn:hover{border-color:rgba(255,255,255,0.2);color:#94a3b8}
.rank-btn svg{width:14px;height:14px}
.rank-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(16px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s ease}
.rank-modal{background:#1a1a2e;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:32px 28px;max-width:520px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.5);animation:slideDown 0.4s ease}
.rank-modal h2{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px;text-align:center}
.rank-modal p.sub{font-size:12px;color:#64748b;margin-bottom:20px;text-align:center}
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{padding:8px 10px;font-size:11px;font-weight:700;color:#475569;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06);text-transform:uppercase;letter-spacing:0.5px}
.rank-table td{padding:10px 10px;font-size:13px;color:#94a3b8;text-align:center;border-bottom:1px solid rgba(255,255,255,0.03)}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr.current td{background:rgba(217,119,6,0.08);color:#fbbf24;border-radius:8px}
.rank-table tr.current td:first-child{border-radius:8px 0 0 8px}
.rank-table tr.current td:last-child{border-radius:0 8px 8px 0}
.rank-table .rank-num{font-weight:800;font-size:14px}
.rank-table .rank-1{color:#fbbf24}
.rank-table .rank-2{color:#94a3b8}
.rank-table .rank-3{color:#d97706}
.rank-table .user-name{font-weight:600;color:#e2e8f0;text-align:left}
.rank-table tr.current .user-name{color:#fbbf24}
.rank-table .stat-num{font-weight:700;color:#e2e8f0;font-size:14px}
.rank-table tr.current .stat-num{color:#fbbf24}
.rank-table .you-badge{display:inline-block;padding:1px 8px;border-radius:6px;background:rgba(217,119,6,0.15);color:#fbbf24;font-size:10px;font-weight:700;margin-left:6px}
.rank-empty{padding:32px;text-align:center;color:#64748b;font-size:13px}
.rank-close{display:block;margin:20px auto 0;padding:10px 32px;border:none;border-radius:10px;background:rgba(255,255,255,0.06);color:#94a3b8;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s}
.rank-close:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}

.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(16px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s ease}
.login-modal{background:#1a1a2e;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:44px 40px 36px;max-width:400px;width:92%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.5);animation:slideDown 0.4s ease}
.login-modal .avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#d97706,#f59e0b);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;box-shadow:0 8px 24px rgba(217,119,6,0.25)}
.login-modal h2{font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:6px}
.login-modal p.sub{font-size:13px;color:#64748b;margin-bottom:28px}
.login-modal input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;font-size:15px;font-family:inherit;color:#e2e8f0;outline:none;transition:all 0.2s;box-sizing:border-box}
.login-modal input:focus{border-color:#d97706;box-shadow:0 0 0 3px rgba(217,119,6,0.1)}
.login-modal input::placeholder{color:#475569}
.login-modal .login-btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:12px;transition:all 0.2s;box-shadow:0 4px 16px rgba(217,119,6,0.2)}
.login-modal .login-btn:hover{box-shadow:0 6px 24px rgba(217,119,6,0.3)}
.login-modal .user-list{margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06)}
.login-modal .user-list p{font-size:12px;color:#475569;margin-bottom:10px}
.login-modal .user-btn{display:inline-block;padding:7px 18px;margin:4px;border:1px solid rgba(255,255,255,0.08);border-radius:100px;background:transparent;font-size:13px;font-family:inherit;color:#94a3b8;cursor:pointer;transition:all 0.2s}
.login-modal .user-btn:hover{border-color:#d97706;color:#fbbf24;background:rgba(217,119,6,0.08)}
.empty-state{text-align:center;padding:56px 20px;color:#64748b}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.empty-state p{font-size:14px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}
@media(max-width:640px){
.app-wrap{padding:20px 16px 40px}
.app-header{padding:28px 0 24px}
.app-header h1{font-size:22px}
.stats-row{grid-template-columns:repeat(2,1fr);gap:8px}
.stat-card{padding:12px 6px}
.stat-card .num{font-size:20px}
.q-card{padding:20px;border-radius:16px}
.q-text{font-size:15px}
.opt{padding:12px 14px;font-size:14px;gap:12px}
.action-bar{gap:6px}
.btn{padding:8px 14px;font-size:12px}
.tab-btn{font-size:12px;padding:10px 4px}
.login-modal{padding:32px 24px 28px}
}

</style>
</head>
<body>
<div class="app-wrap">
<header class="app-header anim-fade"><div class="logo">&#x1F4D6;</div><h1>中级经济师 · 刷题工具</h1><p>&#x300A;经济基础知识&#x300B;·&#x300A;农业经济专业知识与实务&#x300B;</p><div class="glow-line"><button class="rank-btn" onclick="showRanking()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 20V10M12 20V4M18 20V14"/></svg>排行榜</button></div><div class="user-section"><div class="user-badge-simple"><span class="dot"></span><span id="userNameDisplay">未登录</span></div></div></header>
<div class="stats-row anim-fade" style="animation-delay:0.1s"><div class="stat-card"><div class="num" id="totalQ">0</div><div class="label">总题数</div></div><div class="stat-card"><div class="num" id="doneQ">0</div><div class="label">已答题</div></div><div class="stat-card green"><div class="num" id="correctQ">0</div><div class="label">正确数</div></div><div class="stat-card gold"><div class="num" id="rateQ">0%</div><div class="label">正确率</div></div></div>
<div class="tab-bar anim-fade" style="animation-delay:0.15s"><button class="tab-btn active" data-tab="practice">&#x1F4DD; 练习模式</button><button class="tab-btn" data-tab="exam">&#x1F3AF; 模拟考试</button><button class="tab-btn" data-tab="chapter">&#x1F4DA; 章节练习</button><button class="tab-btn" data-tab="wrong">&#x274C; 错题集 <span class="badge" id="wrongBadge">0</span></button></div>
<div class="mode-pills anim-fade" style="animation-delay:0.2s" id="modePills"><button class="pill-btn active" data-mode="all">全部</button><button class="pill-btn" data-mode="single">单选题</button><button class="pill-btn" data-mode="multi">多选题</button></div>
<div id="chapterSection"><div class="chapter-panel"><div class="chip-group" id="chapterBtns"></div></div><div class="section-panel" id="sectionBar" style="display:none"><div class="chip-group" id="sectionBtns"></div></div></div>
<div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="q-card" id="questionCard"><div id="qContent"><div class="empty-state anim-fade"><div class="icon">&#x1F4D6;</div><p>欢迎使用中级经济师刷题工具，<br>选择模式开始练习吧!</p></div></div></div>
<div class="action-bar"><button class="btn btn-outline btn-sm" id="prevBtn" disabled>&#x2190; 上一题</button><button class="btn btn-primary" id="submitBtn">提交答案</button><button class="btn btn-outline btn-sm" id="showAnsBtn">看答案</button><button class="btn btn-success btn-sm" id="nextBtn">下一题 &#x2192;</button><button class="btn btn-ghost btn-sm" id="resetBtn">&#x1F504; 重置</button></div>
</div>

<script src="questions.js"></script>

<script>
// ==================== State ====================
let allQuestions = [...questionBank];
let currentFilter = 'all';
let currentTab = 'practice';
let currentChapter = 'all';
let currentSection = 'all';
let currentIndex = 0;
let answeredState = {};
let wrongSet = new Set();
const letters = ['A', 'B', 'C', 'D', 'E', 'F'];

// ==================== Helpers ====================
function getTypeLabel(q) {
  if (q.type === 'single') return '单选';
  if (q.type === 'multi') return '多选';
  return q.type;
}

function getFilteredQuestions() {
  let qs = allQuestions;
  if (currentTab === 'wrong') {
    qs = qs.filter(q => wrongSet.has(q.id));
  } else if (currentTab === 'chapter') {
    if (currentChapter !== 'all') {
      qs = qs.filter(q => q.chapter === currentChapter);
      if (currentSection !== 'all') qs = qs.filter(q => q.section === currentSection);
    }
  }
  if (currentFilter !== 'all') qs = qs.filter(q => q.type === currentFilter);
  return qs;
}

// ==================== Save / Load ====================
function saveState() {
  const data = { answeredState, wrongSet: [...wrongSet] };
  try { localStorage.setItem('examState', JSON.stringify(data)); } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem('examState');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.answeredState) answeredState = data.answeredState;
    if (data.wrongSet) wrongSet = new Set(data.wrongSet);
  } catch(e) {}
}

// ==================== Render ====================
function render() {
  const qs = getFilteredQuestions();
  const totalEl = document.getElementById('totalQ');
  const doneEl = document.getElementById('doneQ');
  const correctEl = document.getElementById('correctQ');
  const rateEl = document.getElementById('rateQ');

  totalEl.textContent = allQuestions.length;
  const done = Object.values(answeredState).filter(s => s.submitted).length;
  const correct = Object.values(answeredState).filter(s => s.isCorrect).length;
  doneEl.textContent = done;
  correctEl.textContent = correct;
  rateEl.textContent = done ? Math.round(correct / done * 100) + '%' : '0%';

  const wrongCount = wrongSet.size;
  document.getElementById('wrongBadge').textContent = wrongCount;

  // Progress
  const filtered = getFilteredQuestions();
  const doneFiltered = filtered.filter(q => {
    const s = answeredState[q.id];
    return s && s.submitted;
  }).length;
  const pct = filtered.length ? Math.round(doneFiltered / filtered.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  if (qs.length === 0) {
    document.getElementById('qContent').innerHTML =
      '<div class="empty-state fade-in"><div class="icon">' +
      (currentTab === 'wrong' ? '🎉' : '📭') +
      '</div><p>' +
      (currentTab === 'wrong' ? '没有错题，继续保持！' : '暂无私题，请切换其他章节') +
      '</p></div>';
    return;
  }

  if (currentIndex >= qs.length) currentIndex = qs.length - 1;
  if (currentIndex < 0) currentIndex = 0;

  const q = qs[currentIndex];
  const state = answeredState[q.id];
  const submitted = state && state.submitted;
  const selected = state ? state.selected : [];

  let html = '<div class="fade-in">';

  // Meta
  html += '<div class="q-meta">';
  html += '<span class="q-number">#' + (currentIndex + 1) + ' / ' + qs.length + '</span>';
  html += '<span class="q-tag' + (q.type === 'multi' ? ' multi' : '') + '">' + getTypeLabel(q) + '</span>';
  html += '<span class="q-chapter">' + (q.chapter || '') + '</span>';
  html += '</div>';

  // Question text
  html += '<div class="q-text">' + q.text + '</div>';

  // Options
  html += '<div class="options">';
  for (let i = 0; i < q.options.length; i++) {
    let cls = 'opt';
    if (selected.includes(i)) cls += ' selected';
    if (submitted) {
      const correctAnswer = Array.isArray(q.answer) ? q.answer : [q.answer];
      if (selected.includes(i) && correctAnswer.includes(i)) cls += ' correct';
      else if (selected.includes(i) && !correctAnswer.includes(i)) cls += ' wrong';
      else if (!selected.includes(i) && correctAnswer.includes(i)) cls += ' reveal-correct';
    }
    const letter = letters[i] || '';
    html += '<div class="' + cls + '" data-optidx="' + i + '">';
    html += '<span class="letter">' + letter + '</span>';
    html += '<span class="opt-text">' + q.options[i] + '</span>';
    html += '</div>';
  }
  html += '</div>';

  // Explanation
  if (submitted) {
    const correctAnswer = Array.isArray(q.answer) ? q.answer : [q.answer];
    const correctStr = correctAnswer.map(i => letters[i]).join(', ');
    const isCorrect = state.isCorrect;
    html += '<div class="explanation show">';
    html += '<div class="label">' +
      (isCorrect ? '✅ 回答正确' : '❌ 回答错误') +
      ' · 正确答案：' + correctStr + '</div>';
    if (q.explanation) html += '<div>' + q.explanation + '</div>';
    html += '</div>';
  } else {
    html += '<div class="explanation" id="explBox"></div>';
  }

  html += '</div>';
  document.getElementById('qContent').innerHTML = html;

  // Buttons
  document.getElementById('prevBtn').disabled = (currentIndex === 0 || qs.length === 0);
  document.getElementById('nextBtn').disabled = (currentIndex >= qs.length - 1 || qs.length === 0);

  const subBtn = document.getElementById('submitBtn');
  const showBtn = document.getElementById('showAnsBtn');
  subBtn.disabled = submitted;
  if (submitted) subBtn.textContent = '✅ 已提交';
  else subBtn.textContent = (q.type === 'multi') ? '📋 提交答案' : '📋 提交答案';

  // Option click handlers
  document.querySelectorAll('.opt').forEach(el => {
    el.addEventListener('click', function() {
      if (submitted) return;
      const idx = parseInt(this.dataset.optidx);
      const qs2 = getFilteredQuestions();
      if (qs2.length === 0) return;
      const q2 = qs2[currentIndex];
      if (!answeredState[q2.id]) answeredState[q2.id] = { selected: [], submitted: false, isCorrect: false };
      const st = answeredState[q2.id];
      if (q2.type === 'single') {
        st.selected = [idx];
      } else {
        const pos = st.selected.indexOf(idx);
        if (pos >= 0) st.selected.splice(pos, 1);
        else st.selected.push(idx);
      }
      saveState();
      render();
    });
  });

  // Auto scroll to top of question card
  const card = document.getElementById('questionCard');
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ==================== Actions ====================
// Submit
document.getElementById('submitBtn').addEventListener('click', function() {
  const qs = getFilteredQuestions();
  if (qs.length === 0) return;
  const q = qs[currentIndex];
  const state = answeredState[q.id];
  if (!state || state.selected.length === 0) {
    // Hint: select at least one option
    return;
  }
  state.submitted = true;
  const correctAnswer = Array.isArray(q.answer) ? q.answer : [q.answer];
  const sortedSelected = [...state.selected].sort();
  const sortedCorrect = [...correctAnswer].sort();
  let isCorrect = false;
  if (q.type === 'single') {
    isCorrect = sortedSelected.length === 1 && sortedCorrect.length === 1 && sortedSelected[0] === sortedCorrect[0];
  } else {
    isCorrect = sortedSelected.length === sortedCorrect.length &&
      sortedSelected.every((v, i) => v === sortedCorrect[i]);
  }
  state.isCorrect = isCorrect;
  if (!isCorrect && currentTab !== 'wrong') wrongSet.add(q.id);
  else if (isCorrect) wrongSet.delete(q.id);
  saveState();
  render();
});

// Show Answer
document.getElementById('showAnsBtn').addEventListener('click', function() {
  const qs = getFilteredQuestions();
  if (qs.length === 0) return;
  const q = qs[currentIndex];
  const correctAnswer = Array.isArray(q.answer) ? q.answer : [q.answer];
  const correctStr = correctAnswer.map(i => letters[i]).join(', ');

  // Select the correct answers
  if (!answeredState[q.id]) {
    answeredState[q.id] = { selected: [...correctAnswer], submitted: false, isCorrect: true };
  } else {
    const st = answeredState[q.id];
    st.selected = [...correctAnswer];
    st.submitted = false;
  }
  saveState();

  // Show explanation
  const explBox = document.querySelector('.explanation');
  if (explBox) {
    explBox.classList.add('show');
    explBox.innerHTML = '<div class="label">📝 参考答案：' + correctStr + '</div>' +
      (q.explanation ? '<div>' + q.explanation + '</div>' : '');
  }

  // Also reveal options visually (by re-rendering with submitted=true on the state)
  const st = answeredState[q.id];
  st.submitted = true;
  const correctAnswer2 = Array.isArray(q.answer) ? q.answer : [q.answer];
  const sortedSelected = [...st.selected].sort();
  const sortedCorrect = [...correctAnswer2].sort();
  let isCorrect = false;
  if (q.type === 'single') {
    isCorrect = sortedSelected.length === 1 && sortedCorrect.length === 1 && sortedSelected[0] === sortedCorrect[0];
  } else {
    isCorrect = sortedSelected.length === sortedCorrect.length &&
      sortedSelected.every((v, i) => v === sortedCorrect[i]);
  }
  st.isCorrect = isCorrect;
  saveState();
  render();
});

// Prev / Next
document.getElementById('prevBtn').addEventListener('click', function() {
  if (currentIndex > 0) { currentIndex--; render(); }
});
document.getElementById('nextBtn').addEventListener('click', function() {
  const qs = getFilteredQuestions();
  if (currentIndex < qs.length - 1) { currentIndex++; render(); }
});

// Reset
document.getElementById('resetBtn').addEventListener('click', function() {
  if (!confirm('确定重置所有答题记录？')) return;
  answeredState = {};
  wrongSet = new Set();
  currentIndex = 0;
  saveState();
  render();
});

// ==================== Chapter / Section Buttons ====================
// Chinese number to integer
const chnNum = {"零":0,"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9,"十":10,"十一":11,"十二":12,"十三":13,"十四":14,"十五":15,"十六":16,"十七":17,"十八":18,"十九":19,"二十":20,"二十一":21,"二十二":22,"二十三":23,"二十四":24,"二十五":25,"二十六":26,"二十七":27,"二十八":28,"二十九":29,"三十":30,"三十一":31,"三十二":32,"三十三":33,"三十四":34,"三十五":35,"三十六":36,"三十七":37,"三十八":38,"三十九":39,"四十":40};
function chToNum(s) { const m = s.match(/[零一二三四五六七八九十]+/); return m ? (chnNum[m[0]] || 99) : 99; }function buildChapterButtons() {
  const chSet = new Set();
  allQuestions.forEach(q => { if (q.chapter) chSet.add(q.chapter); });
  const container = document.getElementById("chapterBtns");
  if (!container) return;

  // Sort chapters by numeric value
  const chList = Array.from(chSet).sort((a, b) => {
    const na = chToNum(a), nb = chToNum(b);
    if (na !== nb) return na - nb;
    const ma = a.match(/\d+$/), mb = b.match(/\d+$/);
    if (ma && mb) return parseInt(ma[0]) - parseInt(mb[0]);
    return a.localeCompare(b);
  });

  let html = "<button class=\"chip active-all\" data-chapter=\"all\">\U0001f4c2 全部章节</button>";
  chList.forEach(ch => {
    const num = chToNum(ch);
    if (num === 1) html += "<button class=\"chip part-label\">\U0001f4ca 经济学基础（第1-10章）</button>";
    else if (num === 11) html += "<button class=\"chip part-label\">\U0001f4b0 财政（第11-16章）</button>";
    else if (num === 17) html += "<button class=\"chip part-label\">\U0001f3e6 货币与金融（第17-22章）</button>";
    else if (num === 23) html += "<button class=\"chip part-label\">\U0001f4c8 统计（第23-27章）</button>";
    else if (num === 28) html += "<button class=\"chip part-label\">\U0001f4cb 会计（第28-32章）</button>";
    else if (num === 33) html += "<button class=\"chip part-label\">\u2696\ufe0f 法律（第33-37章）</button>";
    else if (num === 99) html += "<button class=\"chip part-label\">\U0001f4dd 模拟试卷</button>";
    html += "<button class=\"chip\" data-chapter=\"" + ch.replace(/'/g, "\\'") + "\">" + ch + "</button>";
  });

  container.innerHTML = html;
  container.querySelectorAll(".chip[data-chapter]").forEach(btn => {
    btn.addEventListener("click", function() {
      container.querySelectorAll(".chip").forEach(b => b.classList.remove("active"));
      this.classList.add("active");
      currentChapter = this.dataset.chapter;
      currentSection = "all";
      currentIndex = 0;
      buildSectionButtons(currentChapter);
      render();
    });
  });
}
function buildSectionButtons(chapterName) {
  const secSet = new Set();
  allQuestions.forEach(q => { if (q.chapter === chapterName && q.section) secSet.add(q.section); });
  const container = document.getElementById('sectionBtns');
  const bar = document.getElementById('sectionBar');
  if (!container) return;
  if (secSet.size === 0) { bar.style.display = 'none'; return; }
  let html = '<button class="chip active-all" data-section="all">📂 全部</button>';
  Array.from(secSet).sort().forEach(sec => {
    html += '<button class="chip" data-section="' + sec.replace(/'/g, "\\'") + '">' + sec + '</button>';
  });
  container.innerHTML = html;
  bar.style.display = 'block';
  container.querySelectorAll('.chip[data-section]').forEach(btn => {
    btn.addEventListener('click', function() {
      container.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentSection = this.dataset.section;
      currentIndex = 0;
      render();
    });
  });
}

// ==================== Tab Switching ====================
document.getElementById('tabBar').querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentTab = this.dataset.tab;
    currentIndex = 0;

    const chSection = document.getElementById('chapterSection');
    const modePills = document.getElementById('modePills');
    if (currentTab === 'chapter') {
      chSection.style.display = 'block';
      modePills.style.display = 'none';
      document.getElementById('sectionBar').style.display = 'none';
      currentSection = 'all';
      buildChapterButtons();
    } else {
      chSection.style.display = 'none';
      modePills.style.display = 'flex';
    }

    // Exam mode: hide mode pills, use different submit logic
    if (currentTab === 'exam') {
      modePills.style.display = 'none';
    }

    render();
  });
});

// ==================== Mode Pills ====================
document.getElementById('modePills').querySelectorAll('.pill-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    if (currentTab === 'wrong' || currentTab === 'exam') return;
    document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.mode;
    currentIndex = 0;
    render();
  });
});

// ==================== Keyboard Shortcuts ====================
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft' || e.key === 'a') {
    const btn = document.getElementById('prevBtn');
    if (!btn.disabled) { currentIndex--; render(); }
  } else if (e.key === 'ArrowRight' || e.key === 'd') {
    const btn = document.getElementById('nextBtn');
    if (!btn.disabled) { currentIndex++; render(); }
  } else if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    if (!btn.disabled) btn.click();
  } else if (e.key === 's') {
    document.getElementById('showAnsBtn').click();
  }
});


// ==================== User Login System ====================
let currentUser = null;
const STORAGE_PREFIX = 'examState_';

function getStorageKey() { return STORAGE_PREFIX + currentUser; }

function getSavedUsers() {
  try { return JSON.parse(localStorage.getItem('examUsers') || '[]'); } catch(e) { return []; }
}
function saveUserList(users) {
  try { localStorage.setItem('examUsers', JSON.stringify(users)); } catch(e) {}
}

function showLoginModal() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginInput').value = '';
  document.getElementById('loginInput').focus();
  document.getElementById('userList').style.display = 'none';
}
function hideLoginModal() {
  document.getElementById('loginOverlay').style.display = 'none';
}

function doLogin() {
  const name = document.getElementById('loginInput').value.trim();
  if (!name) { alert('请输入昵称'); return; }
  loginAs(name);
}

function loginAs(name) {
  currentUser = name;
  // Save to user list
  const users = getSavedUsers();
  if (!users.includes(name)) {
    users.push(name);
    saveUserList(users);
  }
  // Load user data
  loadState();
  hideLoginModal();
  document.getElementById('userNameDisplay').textContent = currentUser;
  render();
}

function logoutUser() {
  currentUser = null;
  document.getElementById('userDropdown').classList.remove('show');
  // Reset everything
  answeredState = {};
  wrongSet = new Set();
  currentIndex = 0;
  showLoginModal();
  render();
}


// Override save/load to use user-specific keys
const _origSaveState = saveState;
const _origLoadState = loadState;

saveState = function() {
  if (!currentUser) return;
  const data = { answeredState, wrongSet: [...wrongSet] };
  try { localStorage.setItem(getStorageKey(), JSON.stringify(data)); } catch(e) {}
};

loadState = function() {
  answeredState = {};
  wrongSet = new Set();
  if (!currentUser) return;
  try {
    const raw = localStorage.getItem(getStorageKey());
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.answeredState) answeredState = data.answeredState;
    if (data.wrongSet) wrongSet = new Set(data.wrongSet);
  } catch(e) {}
};

// Init: check if user already logged in from session
document.addEventListener('DOMContentLoaded', function() {
  // Check if there's a saved current user
  const savedUser = sessionStorage.getItem('examCurrentUser');
  if (savedUser) {
    loginAs(savedUser);
  } else {
    showLoginModal();
  }
});

// Also save current user to session storage when login
const _origLoginAs = loginAs;
loginAs = function(name) {
  _origLoginAs(name);
  try { sessionStorage.setItem('examCurrentUser', name); } catch(e) {}
};

// And clear from session on logout
const _origLogout = logoutUser;
logoutUser = function() {
  _origLogout();
  try { sessionStorage.removeItem('examCurrentUser'); } catch(e) {}
};



function showRanking() {
  var overlay = document.getElementById('rankOverlay');
  var container = document.getElementById('rankContent');
  var users = [];
  try {
    var savedUsers = JSON.parse(localStorage.getItem('examUsers') || '[]');
    savedUsers.forEach(function(name) {
      try {
        var raw = localStorage.getItem('examState_' + name);
        if (!raw) return;
        var data = JSON.parse(raw);
        var done = 0, correct = 0;
        if (data.answeredState) {
          for (var k in data.answeredState) {
            var s = data.answeredState[k];
            if (s.submitted) {
              done++;
              if (s.isCorrect) correct++;
            }
          }
        }
        users.push({name: name, done: done, correct: correct, rate: done > 0 ? Math.round(correct / done * 100) : 0});
      } catch(e) {}
    });
  } catch(e) {}

  // Sort by correct count desc, then rate desc
  users.sort(function(a, b) {
    if (a.correct !== b.correct) return b.correct - a.correct;
    return b.rate - a.rate;
  });

  if (users.length === 0) {
    container.innerHTML = '<div class="rank-empty">还没有用户数据，快去刷题吧!</div>';
    overlay.style.display = 'flex';
    return;
  }

  var html = '<table class="rank-table"><thead><tr><th>排名</th><th style="text-align:left">用户</th><th>已答题</th><th>正确数</th><th>正确率</th></tr></thead><tbody>';
  var medals = ['&#x1F947;', '&#x1F948;', '&#x1F949;'];
  var rankClasses = ['rank-1', 'rank-2', 'rank-3'];

  users.forEach(function(u, i) {
    var rank = i + 1;
    var isCurrentUser = currentUser && u.name === currentUser;
    var cls = isCurrentUser ? 'current' : '';
    var rankDisplay = i < 3 ? '<span class="rank-num ' + rankClasses[i] + '">' + medals[i] + '</span>' : '<span class="rank-num">' + rank + '</span>';
    var nameDisplay = u.name + (isCurrentUser ? '<span class="you-badge">你</span>' : '');
    html += '<tr class="' + cls + '"><td>' + rankDisplay + '</td><td class="user-name">' + nameDisplay + '</td><td><span class="stat-num">' + u.done + '</span></td><td><span class="stat-num">' + u.correct + '</span></td><td>' + u.rate + '%</td></tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
  overlay.style.display = 'flex';
}

// ==================== Init ====================
loadState();
buildChapterButtons();
render();
</script>
</html>
